[plugin]
name = "hayexport"
# Este plugin estende o builtin `export` do host com formatos adicionais
# (Excel, Stata .dta, etc.). O host é informado durante `hay install`.
primitives = ["export"]
version = "0.1.0"
author = "sheep-farm"
description = "Data export plugin for Hayashi"
license = "MIT"
repository = "https://github.com/sheep-farm/hayexport"

[hayashi]
min_version = "0.2.0"
